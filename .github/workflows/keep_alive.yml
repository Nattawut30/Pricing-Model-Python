name: Keep Streamlit App Alive

on:
  schedule:
    # wakey every 3 days
    - cron: '0 0 */3 * *'
  workflow_dispatch: # permission to self-active

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit App
        run: |
          curl -I https://nattawut-blsc.streamlit.app/